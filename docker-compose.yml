version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: watchdog_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: watchdog
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: watchdog_redis
    restart: always
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.7.0
    container_name: watchdog_kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Официальный образ требует уникальный ID кластера (подойдет любая строка)
      CLUSTER_ID: "watchdog-cluster-1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    build: .
    container_name: watchdog_api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - kafka
    restart: always

volumes:
  pg_data: